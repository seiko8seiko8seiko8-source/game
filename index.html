<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🏰 FLAG KINGDOM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#1a1a2e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;padding:8px;min-height:100vh;}
#app{max-width:640px;margin:0 auto;}
.ttl{text-align:center;padding:12px 0 8px;}
.ttl h1{font-size:24px;font-weight:900;color:#f5a623;letter-spacing:2px;}
.ttl .fl{font-size:18px;margin:4px 0;}
.ttl .sub{font-size:10px;color:#aaa;}
.card{background:#16213e;border:1px solid #2a3a5e;border-radius:12px;padding:12px;margin-bottom:8px;}
.ctitle{font-size:13px;font-weight:700;color:#f5a623;margin-bottom:8px;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:13px;color:#aaa;margin-bottom:5px;}
.fg input,.fg select{display:block;width:100%;font-size:16px;padding:12px;border:2px solid #2a3a5e;border-radius:9px;background:#0f3460;color:#fff;outline:none;-webkit-appearance:menulist-button;appearance:menulist;}
.fg input{-webkit-appearance:none;appearance:none;}
.fg input:focus,.fg select:focus{border-color:#e94560;}
.fg input::placeholder{color:#6677aa;}
.fg select option{background:#0f3460;color:#fff;}
.divtxt{text-align:center;font-size:11px;color:#556;margin:6px 0;}
.frow{display:flex;gap:8px;align-items:stretch;margin-bottom:0;}
.frow .fg{flex:1;margin-bottom:0;}
.errmsg{font-size:12px;color:#e94560;min-height:16px;margin-top:4px;}
.btn-start{display:block;width:100%;padding:14px;border:none;border-radius:11px;background:linear-gradient(135deg,#e94560,#f5a623);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-top:8px;}
.btn-start:disabled{background:#2a2a4a;color:#556;}
.btn-join{padding:12px 16px;border:none;border-radius:9px;background:#e94560;color:#fff;font-size:16px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.btn-ctrl{font-size:12px;padding:8px 11px;border:1px solid #2a3a5e;border-radius:7px;background:#16213e;color:#ccc;cursor:pointer;}
.chips{display:flex;flex-wrap:wrap;gap:5px;min-height:22px;margin:6px 0;}
.chip{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:7px;border:1px solid;font-size:11px;}
.chip img{width:22px;height:15px;border-radius:2px;object-fit:cover;}
.sb{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.scard{border:2px solid #2a3a5e;border-radius:9px;padding:5px 7px;text-align:center;min-width:62px;cursor:pointer;background:#0f1e3d;transition:all 0.2s;}
.scard.on{border-color:#f5a623;transform:scale(1.06);box-shadow:0 0 8px rgba(245,166,35,0.4);}
.scard img{width:32px;height:21px;display:block;margin:0 auto 2px;border-radius:2px;object-fit:cover;}
.ss{font-size:13px;font-weight:700;}.sn{font-size:9px;color:#aaa;}.sk{font-size:8px;color:#777;}
.tbanner{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;margin-bottom:5px;border:2px solid #333;}
.tbanner img{width:28px;height:19px;border-radius:2px;object-fit:cover;flex-shrink:0;}
.tt{font-size:12px;font-weight:600;color:#eee;}
.tbar{height:4px;background:#1a1a2e;border-radius:2px;margin-bottom:4px;overflow:hidden;}
.tfill{height:100%;border-radius:2px;background:#44cc44;}
.tinfo{font-size:10px;text-align:center;color:#aaa;margin-bottom:5px;min-height:13px;}
.live{font-size:12px;font-weight:700;color:#f5a623;text-align:center;margin-bottom:5px;min-height:16px;}
.mapwrap{border-radius:11px;padding:3px;border:4px solid #44aa44;background:#1a3a6e;margin-bottom:7px;overflow:hidden;transition:border-color 0.3s,box-shadow 0.3s;}
#gc{display:block;cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none;}
.legend{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.lchip{display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:6px;font-size:10px;font-weight:700;border:1.5px solid;}
.lchip img{width:16px;height:11px;border-radius:2px;object-fit:cover;}
.crow{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.crow img{width:18px;height:12px;border-radius:2px;object-fit:cover;flex-shrink:0;}
.cname{font-size:10px;color:#eee;width:58px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex-shrink:0;}
.cbg{flex:1;height:7px;background:#1a1a2e;border-radius:4px;overflow:hidden;}
.cbar{height:100%;border-radius:4px;transition:width 0.4s;}
.cpct{font-size:10px;color:#888;width:28px;text-align:right;flex-shrink:0;}
.cbtn{font-size:11px;padding:4px 9px;border:none;border-radius:5px;background:#e94560;color:#fff;cursor:pointer;font-weight:700;flex-shrink:0;}
.ctrl{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px;}
.mvpband{background:linear-gradient(135deg,#f5a623,#e94560);border-radius:10px;padding:11px;text-align:center;margin-bottom:10px;}
.mvpband .ml{font-size:10px;color:rgba(255,255,255,0.8);}.mvpband .mn{font-size:20px;font-weight:900;color:#fff;}.mvpband .ms{font-size:11px;color:rgba(255,255,255,0.85);}
.rrow{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;margin-bottom:4px;}
.rrow img{width:30px;height:20px;border-radius:2px;object-fit:cover;}
.rnum{font-size:15px;font-weight:700;width:24px;}.rname{font-size:12px;flex:1;font-weight:600;}
.rbg{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;flex:2;}.rbar{height:100%;border-radius:3px;}
.rscore{font-size:13px;font-weight:700;min-width:42px;text-align:right;}
.sharerow{display:flex;gap:6px;margin-top:8px;}
.sharex{flex:1;padding:9px;border:none;border-radius:8px;background:#000;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
.sharec{flex:1;padding:9px;border:1px solid #333;border-radius:8px;background:#0f3460;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
.ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.82);z-index:7000;align-items:center;justify-content:center;}
.ov.show{display:flex;}
.popbox{background:#16213e;border:2px solid #f5a623;border-radius:14px;padding:14px;max-width:300px;width:92%;max-height:85vh;overflow-y:auto;}
.pophead{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.pophead img{width:42px;height:28px;border-radius:4px;object-fit:cover;}
.popttl{font-size:15px;font-weight:800;color:#f5a623;}.popcnt{font-size:11px;color:#aaa;}
.popsc{text-align:center;font-size:12px;color:#aaa;margin-bottom:9px;}
.popsc span{font-size:22px;font-weight:900;color:#f5a623;}
.mitem{display:flex;align-items:center;gap:7px;padding:6px 8px;background:rgba(255,255,255,0.05);border-radius:6px;margin-bottom:3px;}
.mnum{font-size:11px;color:#777;width:16px;}.mname{font-size:13px;font-weight:600;flex:1;}
.mbadge{font-size:9px;padding:1px 5px;border-radius:4px;background:#e94560;color:#fff;}
.popjoin{width:100%;padding:9px;border:none;border-radius:8px;background:linear-gradient(135deg,#e94560,#f5a623);color:#fff;font-size:13px;font-weight:800;cursor:pointer;margin:9px 0 5px;}
.popclose{width:100%;padding:6px;border:1px solid #333;border-radius:7px;background:transparent;color:#aaa;font-size:11px;cursor:pointer;}
.entryov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center;flex-direction:column;}
.entryov.show{display:flex;}
.entryov img{width:100px;height:67px;border-radius:9px;border:3px solid #f5a623;object-fit:cover;}
.ename{font-size:24px;font-weight:900;color:#fff;margin-top:10px;text-align:center;}
.esub{font-size:13px;color:#f5a623;margin-top:4px;text-align:center;}
.etap{font-size:10px;color:#555;margin-top:12px;}
</style>
</head>
<body>

<div id="entryOv" class="entryov" onclick="this.classList.remove('show')">
  <img id="entryImg" src="" alt="">
  <div class="ename" id="entryName"></div>
  <div class="esub" id="entrySub"></div>
  <div class="etap" id="etapTxt">Tap to close / タップで閉じる</div>
</div>

<div id="popOv" class="ov" onclick="if(event.target===this)closePop()">
  <div class="popbox">
    <div class="pophead"><img id="popImg" src="" alt=""><div><div class="popttl" id="popTtl"></div><div class="popcnt" id="popCnt"></div></div></div>
    <div class="popsc"><span id="popCellsLbl">Cells</span>: <span id="popScore">0</span></div>
    <div id="popMembers"></div>
    <button class="popjoin" id="popJoinBtn" onclick="joinFromPop()">🔥 Join this team!</button>
    <button class="popclose" id="popCloseBtn" onclick="closePop()">✕ Close</button>
  </div>
</div>

<div id="app">
  <div class="ttl">
    <div style="font-size:22px;">👑</div>
    <h1>🏰 FLAG KINGDOM 🌍</h1>
    <div class="fl">🇯🇵🇺🇸🇫🇷🇧🇷🇩🇪🇰🇷</div>
    <div class="sub" id="ttlSub">✨ Conquer the world with your flag! ✨</div>
  </div>

  <div id="joinSec" class="card">
    <div class="ctitle" id="joinTitle">⚔️ Register to Play (2–8 Countries)</div>
    <div class="fg">
      <label id="lblName">① Enter your name</label>
      <input type="text" id="nickIn" placeholder="e.g. Yuka, Tom, Sakura" maxlength="10" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="fg">
      <label id="lblCountry">② Select your country</label>
      <select id="ctSelect" size="1" onchange="onCountrySelect(this.value)">
        <option value="" id="selPlaceholder">▼ Select a country</option>
      </select>
    </div>
    <div class="divtxt" id="divOrText">── Or type country name directly ──</div>
    <div class="frow">
      <div class="fg">
        <input type="text" id="ctText" placeholder="Greece, Mali, Japan…" maxlength="30" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <button class="btn-join" id="btnJoin" onclick="doAdd()">Join！🔥</button>
    </div>
    <div class="errmsg" id="errMsg"></div>
    <div class="chips" id="chips"></div>
    <button class="btn-start" id="startBtn" onclick="startGame()" disabled>🚀 GAME START！🏰</button>
  </div>

  <div id="gameSec" style="display:none;">
    <div class="legend" id="legend"></div>
    <div class="sb" id="sb"></div>
    <div class="tbanner" id="tbanner"></div>
    <div class="tbar"><div class="tfill" id="tfill" style="width:100%;"></div></div>
    <div class="tinfo" id="tinfo"></div>
    <div class="live" id="live">⚔️ Battle is ready!</div>
    <div class="mapwrap" id="mapwrap"><canvas id="gc"></canvas></div>
    <div class="card">
      <div class="ctitle" id="cheerTitle">🎉 Cheer Gauge</div>
      <div id="cheerEl"></div>
    </div>
    <div id="midSec" class="card" style="display:none;">
      <div class="ctitle" id="midTitle">⚔️ Join Mid-Game!</div>
      <div class="fg">
        <label id="midLblName">Name</label>
        <input type="text" id="midNick" placeholder="Enter name" maxlength="10" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <div class="fg">
        <label id="midLblCountry">Country</label>
        <select id="midSel" size="1">
          <option value="" id="midSelPlaceholder">▼ Select a country</option>
        </select>
      </div>
      <div class="errmsg" id="midErr"></div>
      <button class="btn-join" id="midJoinBtn" style="width:100%;padding:12px;font-size:16px;" onclick="doMidJoin()">Join this team！🔥</button>
    </div>
    <div class="ctrl">
      <button class="btn-ctrl" id="midToggleBtn" onclick="toggleMid()">➕ Join</button>
      <button class="btn-ctrl" id="hintBtn" onclick="toggleHint()">💡 Hint</button>
      <button class="btn-ctrl" id="sndBtn" onclick="toggleSnd()">🔊 Sound ON</button>
      <button class="btn-ctrl" id="resetBtn" style="color:#e94560;" onclick="confirmReset()">🔄 Reset</button>
    </div>
  </div>

  <div id="resultSec" style="display:none;">
    <div class="card" id="resultEl"></div>
    <div class="ctrl"><button class="btn-ctrl" id="playAgainBtn" onclick="doReset()">🔄 Play Again！</button></div>
  </div>
</div>

function fUrl(c){return`https://flagcdn.com/w40/${c}.png`;}
function h2k(s){return s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60));}
function findN(q){
  q=q.trim().replace(/\s/g,'');if(!q)return null;
  const ql=q.toLowerCase();const qk=h2k(q).toLowerCase();
  return NS.find(x=>x.k.some(k=>{const kl=k.toLowerCase();return kl===ql||kl===qk||h2k(k).toLowerCase()===ql;}))||null;
}
function findC(c){return NS.find(x=>x.c===c)||null;}

// コンボボックス構築（自国語名で表示）
function buildSelects(){
  const sorted=[...NS].sort((a,b)=>{
    const na=NATIVE_NAMES[a.c]||a.n;
    const nb=NATIVE_NAMES[b.c]||b.n;
    return na.localeCompare(nb);
  });
  ['ctSelect','midSel'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel)return;
    while(sel.options.length>1)sel.remove(1);
    sorted.forEach(x=>{
      const native=NATIVE_NAMES[x.c]||x.n;
      const o=new Option(`${native} (${x.n})`,x.c);
      sel.add(o);
    });
  });
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',buildSelects);
} else {
  buildSelects();
}

// 画像キャッシュ
const IP={},IR={};
function loadImg(c){
  if(!IP[c]){
    IP[c]=new Promise(res=>{
      const i=new Image();i.crossOrigin='anonymous';
      i.onload=()=>{IR[c]=i;res(i);};i.onerror=()=>res(null);
      i.src=fUrl(c);setTimeout(()=>res(null),6000);
    });
  }
  return IP[c];
}
function gImg(c){return IR[c]||null;}
async function preloadAll(codes){await Promise.all(codes.map(async c=>{const i=await loadImg(c);if(i)IR[c]=i;}));}
function fTag(c,w,h){
  const i=gImg(c);
  return`<img src="${i?i.src:fUrl(c)}" width="${w}" height="${h}" style="border-radius:2px;object-fit:cover;border:1px solid rgba(255,255,255,0.18);" crossorigin="anonymous">`;
}

// 参加者
let players=[];
function doAdd(){
  const nick=document.getElementById('nickIn').value.trim();
  const sel=document.getElementById('ctSelect');
  const selCode=sel.value;
  const txt=document.getElementById('ctText').value.trim();
  const err=document.getElementById('errMsg');
  if(!nick){err.textContent=T('errNeedName');return;}
  let nation=selCode?findC(selCode):txt?findN(txt):null;
  if(!nation){err.textContent=T('errNeedCountry');return;}
  if(players.length>=8&&!players.find(p=>p.id===nation.c)){err.textContent=T('errMax');return;}
  err.textContent='';
  const ex=players.find(p=>p.id===nation.c);
  if(ex){ex.nicks.push(nick);}
  else{players.push({id:nation.c,code:nation.c,name:nation.n,nicks:[nick],col:PAL[players.length%8]});}
  document.getElementById('nickIn').value='';sel.value='';
  document.getElementById('ctText').value='';
  document.getElementById('startBtn').disabled=(players.length<2);
  loadImg(nation.c).then(i=>{
    if(i)IR[nation.c]=i;renderChips();
    const msg=ex?T('joinedTeam',nation.n):T('joinedMsg',nation.n);
    showEntry(nation.c,nick,nation.n,msg);
  });
  renderChips();
}
function removeP(id){
  players=players.filter(p=>p.id!==id);
  players.forEach((p,i)=>p.col=PAL[i%8]);
  renderChips();
  document.getElementById('startBtn').disabled=(players.length<2);
}
function renderChips(){
  document.getElementById('chips').innerHTML=players.map(p=>`
    <div class="chip" style="background:${p.col.bg}33;border-color:${p.col.bo};">
      ${fTag(p.code,22,14)}
      <span style="color:#eee;">${p.name}</span>
      <span style="color:${p.col.bo};font-size:10px;"> ${p.nicks.join('・')}</span>
      <span style="cursor:pointer;color:#888;margin-left:3px;font-size:15px;line-height:1;" onclick="removeP('${p.id}')">×</span>
    </div>`).join('');
}
document.getElementById('nickIn').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('ctSelect').focus();}});
document.getElementById('ctText').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doAdd();}});

// サウンド
let AC=null,sndOn=true;
function gAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function note(f,t,v=0.12,d=0.7){
  try{
    const c=gAC();if(!c)return;if(c.state==='suspended')c.resume();
    const p=(fr,vo,du)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=fr;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vo,t+0.004);g.gain.exponentialRampToValueAtTime(vo*0.3,t+0.03);g.gain.exponentialRampToValueAtTime(0.0001,t+du);o.start(t);o.stop(t+du+0.02);};
    p(f,v,d);p(f*2.756,v*0.4,d*0.3);p(f*5.4,v*0.12,0.06);
  }catch(e){}
}
const SC=[[1046.5,1174.66,1318.51,1396.91,1567.98,1760,1975.53,2093],[783.99,880,987.77,1046.5,1174.66,1318.51,1479.98,1567.98],[880,987.77,1108.73,1174.66,1318.51,1479.98,1661.22,1760],[698.46,783.99,880,932.33,1046.5,1174.66,1318.51,1396.91],[987.77,1108.73,1244.51,1318.51,1479.98,1661.22,1864.65,1975.53],[932.33,1046.5,1174.66,1244.51,1396.91,1567.98,1760,1864.65],[830.61,932.33,1046.5,1108.73,1244.51,1396.91,1567.98,1661.22],[739.99,830.61,932.33,987.77,1108.73,1244.51,1396.91,1479.98]];
function playSnd(type,pi=0,fi=0,tot=1){
  if(!sndOn)return;
  try{
    const c=gAC();if(!c)return;if(c.state==='suspended')c.resume();const t=c.currentTime;
    if(type==='place'){SC[pi%8].forEach((f,i)=>note(f,t+i*0.05,0.11,0.75));}
    else if(type==='flip'){const s=SC[pi%8];const si=Math.round(fi/Math.max(tot-1,1)*(s.length-1));note(s[Math.min(si,s.length-1)],t,0.08+0.04*(fi/Math.max(tot-1,1)),0.5);}
    else if(type==='result'){[1046.5,1174.66,1318.51,1396.91,1567.98,1760,1975.53,2093,2349.32].forEach((f,i)=>note(f,t+i*0.065,0.14,1.1));}
    else if(type==='entry'){[523.25,659.25,783.99,1046.5].forEach((f,i)=>setTimeout(()=>{const c2=gAC();if(c2)note(f,c2.currentTime,0.18,0.4);},i*80));}
    else if(type==='cheer'){note(880,t,0.12,0.25);note(1100,t+0.08,0.1,0.2);}
  }catch(e){}
}
function toggleSnd(){
  sndOn=!sndOn;
  const b=document.getElementById('sndBtn');
  if(b)b.textContent=sndOn?T('sndOn'):T('sndOff');
}

// ゲーム変数
let board=null,turnIdx=0,hints=false,gameOver=false,animating=false;
let gPs=[],cv=null,cx=null,CW=0,CH=0;
let lastMove=0,gTmr=null,skipTmr=null,skipSec=60,cheerData={},popCode=null;
const RESET_MS=5*60*1000;

function isL(r,c){return r>=0&&r<ROWS&&c>=0&&c<COLS&&GR[r][c]===1;}
function isCo(r,c){return DIR.some(([dr,dc])=>{const nr=r+dr,nc=c+dc;return nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&GR[nr][nc]===0;});}
function getFlips(r,c,id){
  if(!isL(r,c)||board[r][c])return[];const fl=[];
  for(const[dr,dc]of DIR){let tr=r+dr,tc=c+dc,ln=[];while(isL(tr,tc)){const t=board[tr][tc];if(!t)break;if(t===id){if(ln.length)fl.push(...ln);break;}ln.push([tr,tc]);tr+=dr;tc+=dc;}}
  return fl;
}
function isSetup(){return turnIdx<gPs.length;}
function curTeam(){return gPs[turnIdx%gPs.length];}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}

// ターンに合わせて言語切り替え
function switchLangForTurn(){
  const cur=curTeam();if(!cur)return;
  const lang=COUNTRY_LANG[cur.code]||'en';
  currentLang=lang;
  applyLang();
}

function startSkip(){
  stopSkip();skipSec=60;updSkipUI();
  skipTmr=setInterval(()=>{skipSec--;updSkipUI();if(skipSec<=0){stopSkip();doSkip();}},1000);
}
function stopSkip(){if(skipTmr){clearInterval(skipTmr);skipTmr=null;}}
function updSkipUI(){
  const f=document.getElementById('tfill');const info=document.getElementById('tinfo');
  if(!f||!info||gameOver)return;
  f.style.width=(skipSec/60*100)+'%';
  f.style.background=skipSec>30?'#44cc44':skipSec>10?'#ff9900':'#ff4444';
  const cur=curTeam();if(!cur)return;
  const col=skipSec>30?'#44cc44':skipSec>10?'#ff9900':'#ff4444';
  const who=cur.nicks.join('・');
  info.innerHTML=`<span style="color:${col};">⏱ ${T('secRemain',skipSec,cur.name,who)}</span>`;
}
function doSkip(){
  const cur=curTeam();
  setLive(T('timeout',cur?cur.name:''));
  turnIdx++;switchLangForTurn();updBanner();updBorder();startSkip();lastMove=Date.now();
}
function startGlobal(){
  lastMove=Date.now();if(gTmr)clearInterval(gTmr);
  gTmr=setInterval(()=>{if(gameOver){clearInterval(gTmr);return;}if(Date.now()-lastMove>RESET_MS){clearInterval(gTmr);autoReset();}},5000);
}
function autoReset(){
  setLive(T('autoReset'));
  setTimeout(()=>{
    board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    turnIdx=0;gameOver=false;animating=false;
    initCheer();drawMap();updSB();updBanner();updBorder();renderCheer();
    setLive(T('resetDone'));startGlobal();startSkip();
  },2000);
}

function initCheer(){cheerData={};gPs.forEach(p=>{cheerData[p.id]=20+Math.floor(Math.random()*25);});}
function addCheer(id){
  cheerData[id]=Math.min(100,(cheerData[id]||0)+10);
  renderCheer();playSnd('cheer');
  const p=gPs.find(x=>x.id===id);
  if(p)setLive(T('cheerUp',p.name));
}
function renderCheer(){
  if(!gPs.length)return;
  document.getElementById('cheerEl').innerHTML=gPs.map(p=>{
    const ns=p.nicks.slice(0,2).join('・')+(p.nicks.length>2?` +${p.nicks.length-2}`:'');
    return`<div class="crow">${fTag(p.code,18,12)}<div class="cname">${p.name}<br><span style="font-size:8px;color:#888;">${ns}</span></div><div class="cbg"><div class="cbar" style="width:${cheerData[p.id]||0}%;background:${p.col.bg};"></div></div><div class="cpct">${cheerData[p.id]||0}%</div><button class="cbtn" onclick="addCheer('${p.id}')">📣</button></div>`;
  }).join('');
}

function drawMap(){
  if(!cx||!board||!gPs.length)return;
  cx.fillStyle='#1a3a6e';cx.fillRect(0,0,cv.width,cv.height);
  const cur=curTeam();
  for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){
    const x=c*CW,y=r*CH;
    if(!isL(r,c)){cx.fillStyle=r<3||r>18?'#122a5e':'#1a3a6e';cx.fillRect(x,y,CW,CH);continue;}
    const ow=board[r][c];const tm=ow?gPs.find(p=>p.id===ow):null;
    cx.fillStyle=tm?tm.col.fi:isCo(r,c)?'#d4c47a':'#5cb85c';cx.fillRect(x,y,CW,CH);
    if(!tm){cx.fillStyle='#4a9a4a';if((r*3+c*7)%5===0)cx.fillRect(x+1,y+1,1,2);if((r*5+c*3)%7===0)cx.fillRect(x+CW-2,y+2,1,2);}
    if(hints&&!gameOver&&cur&&!ow&&getFlips(r,c,cur.id).length>0){cx.fillStyle='rgba(255,255,80,0.45)';cx.fillRect(x,y,CW,CH);}
    if(tm){const img=gImg(tm.code);if(img&&img.naturalWidth>0){const fw=Math.max(8,Math.min(CW-2,18));const fh=Math.round(fw*0.67);const fx=x+Math.floor((CW-fw)/2);const fy=y+Math.floor((CH-fh)/2);cx.drawImage(img,fx,fy,fw,fh);cx.strokeStyle='rgba(255,255,255,0.28)';cx.lineWidth=0.5;cx.strokeRect(fx,fy,fw,fh);}else{cx.fillStyle=tm.col.bg;cx.fillRect(x+2,y+2,CW-4,CH-4);}}
    cx.strokeStyle='rgba(0,0,0,0.12)';cx.lineWidth=0.5;cx.strokeRect(x,y,CW,CH);
  }}
}

function getScores(){const s={};gPs.forEach(p=>s[p.id]=0);for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(board[r][c]&&s[board[r][c]]!==undefined)s[board[r][c]]++;}return s;}
function updSB(){
  const sc=getScores();const cur=gameOver?null:curTeam();
  document.getElementById('sb').innerHTML=gPs.map(p=>{
    const on=cur&&p.id===cur.id;
    const ns=p.nicks.slice(0,2).join('・')+(p.nicks.length>2?` +${p.nicks.length-2}`:'');
    return`<div class="scard ${on?'on':''}" style="background:${p.col.bg}22;border-color:${on?p.col.bg:'#2a3a5e'};" onclick="showPop('${p.id}')">${fTag(p.code,32,21)}<div class="ss" style="color:${p.col.bg};">${sc[p.id]}</div><div class="sn">${p.name}</div><div class="sk" style="color:${on?p.col.bg:'#777'};">${on?T('nowTurn'):ns}</div></div>`;
  }).join('');
}
function updBanner(){
  if(gameOver)return;const cur=curTeam();if(!cur)return;
  const who=cur.nicks.slice(0,3).join('・')+(cur.nicks.length>3?` +${cur.nicks.length-3}`:'');
  const b=document.getElementById('tbanner');
  b.innerHTML=`${fTag(cur.code,28,19)}<div class="tt"><b style="color:${cur.col.bg};font-size:14px;">${cur.name}</b> ${T('turnMsg',cur.name,who,isSetup())}</div>`;
  b.style.background=cur.col.bg+'22';b.style.borderColor=cur.col.bg;
}
function updBorder(){
  if(gameOver)return;const cur=curTeam();if(!cur)return;
  const w=document.getElementById('mapwrap');
  w.style.borderColor=cur.col.bg;w.style.boxShadow=`0 0 0 2px ${cur.col.bg}44,0 0 12px ${cur.col.bg}55`;
}
function setLive(t){const el=document.getElementById('live');if(el)el.textContent=t;}
function updLegend(){document.getElementById('legend').innerHTML=gPs.map(p=>`<div class="lchip" style="background:${p.col.bg}22;border-color:${p.col.bo};">${fTag(p.code,16,11)}<span style="color:#eee;">${p.name}</span></div>`).join('');}

function showPop(id){
  const p=gPs.find(x=>x.id===id);if(!p)return;popCode=id;
  const sc=getScores();const img=gImg(p.code);
  document.getElementById('popImg').src=img?img.src:fUrl(p.code);
  document.getElementById('popTtl').textContent=p.name;
  document.getElementById('popCnt').textContent=p.nicks.length+' '+T('popCells');
  document.getElementById('popScore').textContent=sc[id];
  document.getElementById('popCellsLbl').textContent=T('popCells');
  document.getElementById('popJoinBtn').textContent=T('popJoin');
  document.getElementById('popCloseBtn').textContent=T('popClose');
  const cur=curTeam();
  document.getElementById('popMembers').innerHTML=p.nicks.map((n,i)=>`<div class="mitem"><div class="mnum">${i+1}</div><div class="mname">${n}</div>${cur&&cur.id===id&&i===0?`<div class="mbadge">${T('nowTurn')}</div>`:''}</div>`).join('');
  document.getElementById('popOv').classList.add('show');
}
function closePop(){document.getElementById('popOv').classList.remove('show');popCode=null;}
function joinFromPop(){closePop();document.getElementById('midSec').style.display='block';}

function handleTap(clientX,clientY){
  if(gameOver||animating||!board||!gPs.length||!cv)return;
  const rect=cv.getBoundingClientRect();
  if(!rect.width||!rect.height)return;
  const c=Math.floor((clientX-rect.left)*(cv.width/rect.width)/CW);
  const r=Math.floor((clientY-rect.top)*(cv.height/rect.height)/CH);
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  if(!isL(r,c)){setLive(T('noSea'));return;}
  if(board[r][c]){setLive(T('occupied'));return;}
  const cur=curTeam();const pi=gPs.indexOf(cur);const nick=rnd(cur.nicks);
  lastMove=Date.now();stopSkip();
  try{const ac=gAC();if(ac&&ac.state==='suspended')ac.resume();}catch(e){}
  if(isSetup()){
    board[r][c]=cur.id;playSnd('place',pi);turnIdx++;
    drawMap();updSB();updBanner();updBorder();
    switchLangForTurn();
    setLive(T('plantFlag',nick,cur.name)+(turnIdx>=gPs.length?' '+T('letsGo'):''));
    startSkip();return;
  }
  const flips=getFlips(r,c,cur.id);board[r][c]=cur.id;playSnd('place',pi);drawMap();
  if(!flips.length){
    turnIdx++;updSB();updBanner();updBorder();
    switchLangForTurn();
    setLive(T('holdsLine',nick));startSkip();checkFull();return;
  }
  const tot=flips.length;const iv=Math.max(55,100-tot*3);animating=true;
  const liveMsg=tot>=5?rnd([T('bigCapture',nick,tot),T('attack',nick,tot)]):tot>=3?T('capture3',nick,tot):T('capture1',nick,tot);
  setLive(liveMsg);
  flips.forEach(([fr,fc],i)=>{setTimeout(()=>{playSnd('flip',pi,i,tot);board[fr][fc]=cur.id;drawMap();updSB();},i*iv);});
  setTimeout(()=>{
    animating=false;turnIdx++;
    updSB();updBanner();updBorder();
    switchLangForTurn();
    startSkip();checkFull();
  },tot*iv+250);
}

const gcEl=document.getElementById('gc');
gcEl.addEventListener('click',e=>{e.preventDefault();handleTap(e.clientX,e.clientY);});
gcEl.addEventListener('touchend',function(e){e.preventDefault();if(e.changedTouches.length>0){const t=e.changedTouches[0];handleTap(t.clientX,t.clientY);}},{passive:false});

function checkFull(){
  let n=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(isL(r,c)&&board[r][c])n++;}
  if(n>=LTOTAL){gameOver=true;stopSkip();if(gTmr)clearInterval(gTmr);setTimeout(()=>{playSnd('result');showResult();},600);}
}
function showResult(){
  document.getElementById('gameSec').style.display='none';document.getElementById('resultSec').style.display='block';
  const sc=getScores();const rk=[...gPs].map(p=>({...p,score:sc[p.id]})).sort((a,b)=>b.score-a.score);
  const mx=rk[0].score;const mvp=rk[0];const mvpN=rnd(mvp.nicks);
  const md=['🥇','🥈','🥉','4','5','6','7','8'];
  window._sT=T('shareText',mvpN,mvp.name,mvp.score);
  document.getElementById('resultEl').innerHTML=`
    <div style="font-size:18px;font-weight:900;text-align:center;margin-bottom:8px;color:#f5a623;">${T('gameOver')}</div>
    <div class="mvpband"><div class="ml">${T('mvpLabel')}</div><div class="mn">${mvpN}</div><div class="ms">${T('mvpSub',mvp.name,mvp.score)}</div></div>
    ${rk.map((p,i)=>`<div class="rrow" style="background:${p.col.bg}22;border:1.5px solid ${p.col.bo};"><div class="rnum">${md[i]||i+1}</div>${fTag(p.code,30,20)}<div class="rname" style="color:#eee;">${p.name}<br><span style="font-size:9px;color:#888;">${p.nicks.join('・')}</span></div><div class="rbg"><div class="rbar" style="width:${Math.round(p.score/mx*100)}%;background:${p.col.bg};"></div></div><div class="rscore" style="color:${p.col.bg};">${p.score}</div></div>`).join('')}
    <div class="sharerow">
      <button class="sharex" onclick="window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(window._sT),'_blank')">${T('shareX')}</button>
      <button class="sharec" onclick="doCopy()">${T('shareCopy')}</button>
    </div>
    <div style="margin-top:12px;padding:12px;background:rgba(245,166,35,0.1);border:1.5px solid #f5a623;border-radius:10px;text-align:center;">
      <div style="font-size:12px;color:#f5a623;font-weight:700;margin-bottom:8px;">${T('supportMsg')}</div>
      <div style="display:flex;gap:8px;">
        <button onclick="window.open('https://ofuse.me/YOUR_ID','_blank')" style="flex:1;padding:10px;border:none;border-radius:8px;background:#1DA1F2;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">🎁 Ofuse</button>
        <button onclick="window.open('https://www.buymeacoffee.com/YOUR_ID','_blank')" style="flex:1;padding:10px;border:none;border-radius:8px;background:#FFDD00;color:#000;font-size:13px;font-weight:700;cursor:pointer;">☕ Buy Me a Coffee</button>
      </div>
    </div>`;
}
function doCopy(){
  if(navigator.clipboard){navigator.clipboard.writeText(window._sT||'').then(()=>alert(T('copied'))).catch(()=>alert(window._sT||''));}
  else{alert(window._sT||'');}
}

async function startGame(){
  if(players.length<2){document.getElementById('errMsg').textContent=T('errMin');return;}
  gPs=[...players];
  const btn=document.getElementById('startBtn');
  btn.textContent=T('loadingFlags');btn.disabled=true;
  try{const ac=gAC();if(ac&&ac.state==='suspended')await ac.resume();}catch(e){}
  await preloadAll(gPs.map(p=>p.code));
  btn.textContent=T('btnStart');btn.disabled=false;
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  turnIdx=0;hints=false;gameOver=false;animating=false;initCheer();
  // 最初のチームの言語に切り替え
  const firstTeam=gPs[0];
  if(firstTeam){
    currentLang=COUNTRY_LANG[firstTeam.code]||'en';
    applyLang();
  }
  document.getElementById('joinSec').style.display='none';
  document.getElementById('resultSec').style.display='none';
  document.getElementById('gameSec').style.display='block';
  setTimeout(()=>{
    cv=document.getElementById('gc');cx=cv.getContext('2d');
    const wrap=document.getElementById('mapwrap');
    const ww=Math.max(200,wrap.getBoundingClientRect().width||300);
    CW=Math.max(12,Math.floor((ww-8)/COLS));
    CH=Math.max(9,Math.floor(CW*0.78));
    cv.width=COLS*CW;cv.height=ROWS*CH;
    updLegend();updSB();updBanner();updBorder();renderCheer();drawMap();
    setLive(T('gameBegin'));
    startGlobal();startSkip();
  },200);
}

function toggleMid(){const p=document.getElementById('midSec');p.style.display=p.style.display==='none'?'block':'none';}
function doMidJoin(){
  const nick=document.getElementById('midNick').value.trim();
  const code=document.getElementById('midSel').value;
  const err=document.getElementById('midErr');
  if(!nick){err.textContent=T('errNeedNameMid');return;}
  if(!code){err.textContent=T('errNeedCountryMid');return;}
  err.textContent='';
  const nation=findC(code);if(!nation)return;
  const ex=gPs.find(p=>p.id===code);
  if(ex){ex.nicks.push(nick);}
  else{if(gPs.length>=8){err.textContent=T('errMaxMid');return;}const np={id:code,code,name:nation.n,nicks:[nick],col:PAL[gPs.length%8]};gPs.push(np);players.push(np);cheerData[code]=25;}
  document.getElementById('midNick').value='';document.getElementById('midSel').value='';
  document.getElementById('midSec').style.display='none';
  loadImg(code).then(i=>{
    if(i)IR[code]=i;drawMap();updSB();updLegend();renderCheer();
    const msg=ex?T('joinedTeam',nation.n):T('joinedMsg',nation.n);
    showEntry(code,nick,nation.n,msg);
  });
  updLegend();updSB();renderCheer();setLive(T('midJoined',nick,nation.n));
}

function confirmReset(){if(confirm(T('resetConfirm')))doReset();}
function doReset(){
  stopSkip();if(gTmr)clearInterval(gTmr);
  players=[];gPs=[];board=null;turnIdx=0;gameOver=false;animating=false;
  currentLang='en';applyLang();
  document.getElementById('chips').innerHTML='';
  document.getElementById('startBtn').disabled=true;
  document.getElementById('errMsg').textContent='';
  document.getElementById('ctSelect').value='';
  document.getElementById('gameSec').style.display='none';
  document.getElementById('resultSec').style.display='none';
  document.getElementById('joinSec').style.display='block';
}
function toggleHint(){
  hints=!hints;
  const b=document.getElementById('hintBtn');
  if(b)b.textContent=hints?T('hintOff'):T('hint');
  drawMap();
}
let rszT=null;
window.addEventListener('resize',()=>{if(!cv||!board)return;clearTimeout(rszT);rszT=setTimeout(()=>{const w=document.getElementById('mapwrap');const ww=Math.max(200,w.getBoundingClientRect().width||300);CW=Math.max(12,Math.floor((ww-8)/COLS));CH=Math.max(9,Math.floor(CW*0.78));cv.width=COLS*CW;cv.height=ROWS*CH;drawMap();},300);});

// 初期UI適用
applyLang();
</script>
